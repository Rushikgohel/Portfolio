<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b132b" />
      <stop offset="100%" stop-color="#1c2541" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" />
  <rect width="796" height="496" x="2" y="2" rx="14" fill="none" stroke="#334155" stroke-width="2" />

  <!-- Decorative elements -->
  <g opacity="0.05">
    <circle cx="150" cy="400" r="180" fill="#ffffff" />
    <circle cx="650" cy="100" r="150" fill="#ffffff" />
  </g>

  <!-- Central Graphic - Book with digital aura -->
  <g transform="translate(400, 220)">
    <!-- Aura glow -->
    <path d="M-120 40 C-80 -40, 80 -40, 120 40" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Open Book Pages (Left) -->
    <path d="M-100 40 C-70 10, -30 10, 0 35 L0 -45 C-30 -70, -70 -70, -100 -40 Z" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <!-- Open Book Pages (Right) -->
    <path d="M100 40 C70 10, 30 10, 0 35 L0 -45 C30 -70, 70 -70, 100 -40 Z" fill="#1e293b" stroke="#475569" stroke-width="2" />
    
    <!-- Inner pages stack lines (left) -->
    <path d="M-90 33 C-65 5, -30 5, -5 28" fill="none" stroke="#64748b" stroke-width="2" />
    <path d="M-90 23 C-65 -5, -30 -5, -5 18" fill="none" stroke="#64748b" stroke-width="2" />
    <path d="M-90 13 C-65 -15, -30 -15, -5 8" fill="none" stroke="#64748b" stroke-width="2" />

    <!-- Inner pages stack lines (right) -->
    <path d="M90 33 C65 5, 30 5, 5 28" fill="none" stroke="#64748b" stroke-width="2" />
    <path d="M90 23 C65 -5, 30 -5, 5 18" fill="none" stroke="#64748b" stroke-width="2" />
    <path d="M90 13 C65 -15, 30 -15, 5 8" fill="none" stroke="#64748b" stroke-width="2" />
    
    <!-- Bookmark/Ribbon -->
    <path d="M0 35 L0 80 L15 70 L30 80 L30 31 Z" fill="#ef4444" opacity="0.9" />

    <!-- Sparkles / Tech nodes rising -->
    <circle cx="-40" cy="-60" r="4" fill="#06b6d4" />
    <line x1="-40" y1="-60" x2="-20" y2="-40" stroke="#06b6d4" stroke-width="1.5" opacity="0.6" />
    
    <circle cx="50" cy="-80" r="5" fill="#3b82f6" />
    <line x1="50" y1="-80" x2="30" y2="-50" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
    
    <circle cx="10" cy="-100" r="3" fill="#38bdf8" />
  </g>

  <!-- Text -->
  <text x="400" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="28" fill="#ffffff" letter-spacing="1">
    LIBRARY MANAGEMENT
  </text>
  <text x="400" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">
    Digital Book Inventory &amp; Loans Tracker
  </text>
</svg>
