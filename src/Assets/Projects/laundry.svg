<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" />
  <rect width="796" height="496" x="2" y="2" rx="14" fill="none" stroke="#334155" stroke-width="2" />

  <!-- Decorative circles / grid -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="150" fill="#ffffff" />
    <circle cx="700" cy="400" r="200" fill="#ffffff" />
  </g>

  <!-- Central Graphic - Laundry Machine representation -->
  <g transform="translate(400, 220)">
    <!-- Washing machine body -->
    <rect x="-100" y="-120" width="200" height="240" rx="20" fill="#1e293b" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)" />
    
    <!-- Top control panel -->
    <rect x="-100" y="-120" width="200" height="40" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <circle cx="-70" cy="-100" r="6" fill="#3b82f6" />
    <circle cx="-50" cy="-100" r="4" fill="#10b981" />
    <rect x="20" y="-105" width="50" height="10" rx="3" fill="#334155" />
    
    <!-- Drum window (outer) -->
    <circle cx="0" cy="30" r="65" fill="#0f172a" stroke="#475569" stroke-width="3" />
    <!-- Drum water/swirl (inner) -->
    <circle cx="0" cy="30" r="50" fill="url(#bubbleGrad)" />
    
    <!-- Swirl wave -->
    <path d="M -35 30 Q -10 10 15 30 T 40 30" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7" />
    <path d="M -30 40 Q -5 20 20 40 T 35 40" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    
    <!-- Bubbles -->
    <circle cx="-20" cy="10" r="8" fill="#ffffff" opacity="0.6" />
    <circle cx="25" cy="5" r="5" fill="#ffffff" opacity="0.7" />
    <circle cx="10" cy="-15" r="6" fill="#ffffff" opacity="0.5" />
  </g>

  <!-- Text -->
  <text x="400" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="28" fill="#ffffff" letter-spacing="1">
    LAUNDRY MANAGEMENT
  </text>
  <text x="400" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">
    Automated Service &amp; Order Workflow
  </text>
</svg>
